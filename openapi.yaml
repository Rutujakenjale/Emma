openapi: 3.0.3
info:
  title: Coupon Import API
  version: 1.0.0
  description: |
    Async bulk coupon import API. Upload CSVs, track import jobs, download failures,
    and retry failed records.

servers:
  - url: http://localhost:9090/api/v1

paths:
  /imports:
    post:
      summary: Initiate CSV import
      description: Upload a CSV file containing coupon codes. Returns a job id and starts async processing.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        '202':
          description: Import accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
  /imports/{id}:
    get:
      summary: Get import job status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Import job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /imports/{id}/errors:
    get:
      summary: List failed records for an import
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [json,csv]
            default: json
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Error records
          content:
            application/json:
              schema:
                type: object
                properties:
                  import_job_id:
                    type: string
                  total_errors:
                    type: integer
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImportError'
  /imports/{id}/retry:
    post:
      summary: Retry failed records
      description: Create a new import job that reprocesses failed records from the original job.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Retry job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  import_job_id:
                    type: string
                  original_job_id:
                    type: string
                  status:
                    type: string

components:
  schemas:
    ImportJobResponse:
      type: object
      properties:
        id:
          type: string
        file_name:
          type: string
        status:
          type: string
        progress:
          type: object
          properties:
            total_rows:
              type: integer
            processed_rows:
              type: integer
            success_count:
              type: integer
            failure_count:
              type: integer
            percentage:
              type: number
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    ImportAccepted:
      type: object
      properties:
        import_job_id:
          type: string
        file_name:
          type: string
        status:
          type: string

    ImportError:
      type: object
      properties:
        id:
          type: string
        import_job_id:
          type: string
        row_number:
          type: integer
        raw_data:
          type: string
        error_message:
          type: string

    Error:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  
